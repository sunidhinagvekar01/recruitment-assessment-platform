<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <title>{% block title %}RecruitAssess{% endblock %}</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#EEF2E8; color:#e2e8f0; min-height:100vh; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 40px;
      background:#F4F6F1;
      border-bottom:1px solid #CBD5C0;
    }
    .logo { font-size:18px; font-weight:700; color:#758467; letter-spacing:-0.5px; }
    .logo span { color:#2F3E34; }
    .nav-right { display:flex; align-items:center; gap:20px; }
    .nav-right a { font-size:14px; color:#2F3E34; text-decoration:none; transition:color .2s; }
    .nav-right a:hover { color:#e2e8f0; }
    .nav-badge {
      font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px;
      letter-spacing:.5px; text-transform:uppercase;
    }
    .badge-candidate { background:#065f46; color:#a7f3d0; }
    .badge-recruiter  { background:#312e81; color:#c4b5fd; }

    .container {max-width:1200px;margin:0 auto;padding:40px 20px;}
    .page-title { font-size:32px; font-weight:700; color:#2F3A2F; margin-bottom:8px; }
    .page-sub   { font-size:15px; color:#6B7280; margin-bottom:32px; }

    .card {
      background:#F2F5EC;
      border:1px solid #CBD5C0;
      border-radius:18px;
      padding:28px;
      margin-bottom:24px;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }
    .card-title { font-size:16px; font-weight:600; margin-bottom:16px; color:#2F3E34; }

    .btn {
      display:inline-block; padding:11px 28px; border-radius:8px; font-size:14px;
      font-weight:600; cursor:pointer; text-decoration:none; border:none; transition:all .2s;
    }
    .btn-primary { background:#758467; color:#fff; }
    .btn-primary:hover { background:#64745a;  transform:translateY(-1px); }
    .btn-outline { background:#ffffff; color:#2F3E34; border:1px solid #CBD5C0; }
    .btn-outline:hover { border-color:#758467; color:#2F3E34; }
    .btn-danger  { background:#dc2626; color:#fff; }
    .btn-sm      { padding:7px 16px; font-size:13px; }

    .form-group { margin-bottom:18px; }
    .form-group label {display:block;font-size:13px;color:#475569;margin-bottom:6px;font-weight:500;}
    .form-group input, .form-group select, .form-group textarea { width:100%; background:#ffffff; border:1px solid #CBD5C0; border-radius:10px; padding:11px 14px; font-size:14px; color:#2F3E34; outline:none; transition:border .2s; font-family:inherit; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#758467; }
    .form-group select option { background:#ffffff; color:#2F3E34; }
    
    .form-header {background:#758467;padding:25px;border-radius:12px;margin-bottom:30px;text-align:center;}
    .form-header h1, .form-header p { color: white; }
    .form-header p {color: rgba(255,255,255,0.85);font-size:16px;}

    .alert-error {
      background:#2d0a0a; border:1px solid #dc2626; border-radius:8px;
      padding:12px 16px; font-size:14px; color:#fca5a5; margin-bottom:20px;
    }
    .alert-success {
      background:#052e16; border:1px solid #22c55e; border-radius:8px;
      padding:12px 16px; font-size:14px; color:#86efac; margin-bottom:20px;
    }
    
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { text-align:left; padding:10px 14px; font-size:11px; font-weight:700;
         letter-spacing:.8px; text-transform:uppercase; color:#475569;
         border-bottom:1px solid #334155; }
    td { padding:13px 14px; border-bottom:1px solid #E5E7EB; color:#2F3E34; }
    tr:hover td { background:#ffffff08; }

    .badge {
      display:inline-block; font-size:11px; font-weight:700; padding:3px 10px;
      border-radius:99px; letter-spacing:.5px;
    }
    .badge-green  { background:#052e16; color:#86efac; }
    .badge-blue   { background:#1e3a5f; color:#93c5fd; }
    .badge-purple { background:#1e1b4b; color:#c4b5fd; }
    .badge-amber  { background:#431407; color:#fde68a; }
    .badge-red    { background:#2d0a0a; color:#fca5a5; }
    .badge-gray   { background:#1e293b; color:#64748b; }

    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:#0f172a; border:1px solid #334155; border-radius:12px; padding:18px; text-align:center; }
    .stat-val  { font-size:30px; font-weight:800; margin-bottom:4px; }
    .stat-lbl  { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:#475569; }

    @media(max-width:600px){
      nav { padding:14px 20px; }
      .container { padding:24px 14px; }
      .stat-grid { grid-template-columns:repeat(2,1fr); }
    }

.option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-header{
    text-align:center;
    margin-bottom:20px;
}

.form-title{
    font-size:38px;
    font-weight:700;
    color:#2F3A2F;
    margin-bottom:8px;
}

.form-subtitle{
    color:#6B7280;
    font-size:15px;
}

.form-divider{
    border:none;
    height:1px;
    background:#CBD5C0;
    margin:25px 0;
}

  </style>
  {% block head %}{% endblock %}
</head>
<body>

{% if session.user_id %}
<nav>
  <div class="logo">Recruit<span>Assess</span></div>
  <div class="nav-right">
    <span class="nav-badge {% if session.role=='recruiter' %}badge-recruiter{% else %}badge-candidate{% endif %}">
      {{ session.role }}
    </span>
    <span style="font-size:14px;color:#2F3E34">{{ session.name }}</span>
    <a href="/logout">Log out</a>
  </div>
</nav>


{% endif %}

{% block content %}{% endblock %}

</body>
</html>
