<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RecruitAssess{% endblock %}</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 40px; background:#1e293b; border-bottom:1px solid #334155;
    }
    .logo { font-size:18px; font-weight:700; color:#818cf8; letter-spacing:-0.5px; }
    .logo span { color:#e2e8f0; }
    .nav-right { display:flex; align-items:center; gap:20px; }
    .nav-right a { font-size:14px; color:#64748b; text-decoration:none; transition:color .2s; }
    .nav-right a:hover { color:#e2e8f0; }
    .nav-badge {
      font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px;
      letter-spacing:.5px; text-transform:uppercase;
    }
    .badge-candidate { background:#065f46; color:#a7f3d0; }
    .badge-recruiter  { background:#312e81; color:#c4b5fd; }

    .container { max-width:900px; margin:0 auto; padding:40px 20px; }
    .page-title { font-size:26px; font-weight:700; margin-bottom:8px; }
    .page-sub   { font-size:14px; color:#64748b; margin-bottom:32px; }

    .card {
      background:#1e293b; border:1px solid #334155; border-radius:14px;
      padding:28px; margin-bottom:20px;
    }
    .card-title { font-size:16px; font-weight:600; margin-bottom:16px; color:#f1f5f9; }

    .btn {
      display:inline-block; padding:11px 28px; border-radius:8px; font-size:14px;
      font-weight:600; cursor:pointer; text-decoration:none; border:none; transition:all .2s;
    }
    .btn-primary { background:#6366f1; color:#fff; }
    .btn-primary:hover { background:#4f46e5; transform:translateY(-1px); }
    .btn-outline { background:transparent; color:#94a3b8; border:1px solid #475569; }
    .btn-outline:hover { border-color:#94a3b8; color:#e2e8f0; }
    .btn-danger  { background:#dc2626; color:#fff; }
    .btn-sm      { padding:7px 16px; font-size:13px; }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-size:13px; color:#94a3b8; margin-bottom:6px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; background:#0f172a; border:1px solid #334155; border-radius:8px;
      padding:11px 14px; font-size:14px; color:#e2e8f0; outline:none; transition:border .2s;
      font-family:inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color:#6366f1;
    }
    .form-group select option { background:#1e293b; }

    .alert-error {
      background:#2d0a0a; border:1px solid #dc2626; border-radius:8px;
      padding:12px 16px; font-size:14px; color:#fca5a5; margin-bottom:20px;
    }
    .alert-success {
      background:#052e16; border:1px solid #22c55e; border-radius:8px;
      padding:12px 16px; font-size:14px; color:#86efac; margin-bottom:20px;
    }

    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { text-align:left; padding:10px 14px; font-size:11px; font-weight:700;
         letter-spacing:.8px; text-transform:uppercase; color:#475569;
         border-bottom:1px solid #334155; }
    td { padding:13px 14px; border-bottom:1px solid #1e293b; color:#94a3b8; }
    tr:hover td { background:#ffffff08; }

    .badge {
      display:inline-block; font-size:11px; font-weight:700; padding:3px 10px;
      border-radius:99px; letter-spacing:.5px;
    }
    .badge-green  { background:#052e16; color:#86efac; }
    .badge-blue   { background:#1e3a5f; color:#93c5fd; }
    .badge-purple { background:#1e1b4b; color:#c4b5fd; }
    .badge-amber  { background:#431407; color:#fde68a; }
    .badge-red    { background:#2d0a0a; color:#fca5a5; }
    .badge-gray   { background:#1e293b; color:#64748b; }

    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:#0f172a; border:1px solid #334155; border-radius:12px; padding:18px; text-align:center; }
    .stat-val  { font-size:30px; font-weight:800; margin-bottom:4px; }
    .stat-lbl  { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:#475569; }

    @media(max-width:600px){
      nav { padding:14px 20px; }
      .container { padding:24px 14px; }
      .stat-grid { grid-template-columns:repeat(2,1fr); }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

{% if session.user_id %}
<nav>
  <div class="logo">Recruit<span>Assess</span></div>
  <div class="nav-right">
    <span class="nav-badge {% if session.role=='recruiter' %}badge-recruiter{% else %}badge-candidate{% endif %}">
      {{ session.role }}
    </span>
    <span style="font-size:14px;color:#94a3b8">{{ session.name }}</span>
    <a href="/logout">Log out</a>
  </div>
</nav>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
