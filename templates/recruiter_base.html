<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}RecruitAssess{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:#F6F8F2;
            color:#2F3A2F;
        }

        .layout{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:240px;
            background:#758467;
            position:fixed;
            top:0;
            left:0;
            height:100vh;
            padding:32px 24px;
            display:flex;
            flex-direction:column;
        }

        .brand{
            margin-bottom:50px;
        }

        .brand h2{
            color:#DFE6DA;
            font-size:22px;
            font-weight:700;
            letter-spacing:-0.5px;
        }

        .brand p{
            color:#CBD5C0;
            font-size:13px;
            margin-top:4px;
        }

        .nav{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .nav a{
            text-decoration:none;
            color:#DFE6DA;
            padding:12px 16px;
            border-radius:12px;
            font-size:14px;
            font-weight:500;
            transition:0.2s;
        }

        .nav a:hover{
            background:#819171;
        }

        .logout{
            margin-top:auto;
        }

        .main{
            margin-left:240px;
            width:100%;
            padding:40px;
        }

        .page-header{
            margin-bottom:32px;
        }

        .page-title{
            font-size:32px;
            font-weight:700;
            color:#2F3A2F;
            margin-bottom:8px;
        }

        .page-sub{
            color:#6B7280;
            font-size:15px;
            line-height:1.6;
        }

        .stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:32px;
}

.stat-card{
    background:white;
    border:1px solid #CBD5C0;
    border-radius:18px;
    padding:24px;
}

.stat-number{
    font-size:32px;
    font-weight:700;
    color:#758467;
    margin-bottom:6px;
}

.stat-label{
    font-size:14px;
    color:#6B7280;
}

        .card{
            background:white;
            border:1px solid #CBD5C0;
            border-radius:18px;
            padding:24px;
            margin-bottom:20px;
        }

        .assessment-card{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:28px 32px;
        }

        .assessment-title{
            font-size:18px;
            font-weight:600;
            color:#2F3E34;
            margin-bottom:8px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            border:none;
            cursor:pointer;
            padding:12px 20px;
            border-radius:12px;
            font-size:14px;
            font-weight:600;
        }

        .btn-primary{
            background:#758467;
            color:white;
        }

        .btn-primary:hover{
            background:#819171;
        }

        .btn-outline{
            background:white;
            border:1px solid #CBD5C0;
            color:#2F3A2F;
        }

        .btn-danger{
            background:#b42318;
            color:white;
        }

        .empty-state{
            text-align:center;
            padding:60px 40px;
        }

        .empty-state h3{
            font-size:24px;
            font-weight:600;
            color:#2F3E34;
            margin-bottom:12px;
        }       

        .empty-state p{
        color:#6B7280;
        margin-bottom:24px;
        }

    </style>

    {% block head %}{% endblock %}
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <div class="brand">
            <h2>RecruitAssess</h2>
            <p>Recruitment Platform</p>
        </div>

        <nav class="nav">

            <a href="/recruiter">Dashboard</a>

            <a href="/recruiter">
                Assessments
            </a>

            <a href="/recruiter/question-bank">
                Question Bank
            </a>

            <a href="#">
                Candidates
            </a>

            <a href="#">
                Analytics
            </a>

        </nav>

        <div class="logout">
            <a href="/logout" class="btn btn-outline">
                Logout
            </a>
        </div>

    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

</div>

</body>
</html>
