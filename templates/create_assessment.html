{% extends "recruiter_base.html" %}
{% block title %}Create Assessment{% endblock %}
{% block head %}
<style>
.form-group{margin-bottom:18px;}

.form-group label{
    display:block;
    margin-bottom:6px;
    color:#2F3E34;
    font-size:14px;
    font-weight:500;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid #CBD5C0;
    border-radius:12px;
    background:white;
    color:#2F3E34;
    font-size:14px;
    font-family:inherit;
}
</style>
{% endblock %}
{% block content %}
<div class="container"></div>
  <h1 class="page-title">Create Assessment</h1>
  <p class="page-sub">Fill in the details below to set up a new assessment.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Assessment Title</label>
        <input type="text" name="title" required placeholder="e.g. Python Developer Test">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Brief description for candidates..."></textarea>
      </div>
      <div class="form-group">
        <label>Time per question (seconds)</label>
        <input type="number" name="time_limit" value="60" min="10" max="300">
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Create & Add Questions →</button>
        <a href="/recruiter" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
