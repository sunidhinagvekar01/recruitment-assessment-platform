{% extends "base.html" %}

{% block title %}Edit Question{% endblock %}

{% block content %}
<div class="container">

    <h1 class="page-title">
        ✏️ Edit Question
    </h1>

    <form method="POST">

        <div class="card">

            <label>Question</label>

            <textarea
                name="question_text"
                required
                style="width:100%;min-height:100px"
            >{{ question.question_text }}</textarea>

            <br><br>

            <label>Option A</label>
            <input
                type="text"
                name="option_a"
                value="{{ question.option_a }}"
                required
                class="input"
            >

            <label>Option B</label>
            <input
                type="text"
                name="option_b"
                value="{{ question.option_b }}"
                required
                class="input"
            >

            <label>Option C</label>
            <input
                type="text"
                name="option_c"
                value="{{ question.option_c }}"
                required
                class="input"
            >

            <label>Option D</label>
            <input
                type="text"
                name="option_d"
                value="{{ question.option_d }}"
                required
                class="input"
            >

            <br>

            <label>Correct Option</label>

            <select name="correct_option">

                <option value="A"
                    {% if question.correct_option == 'A' %}
                    selected
                    {% endif %}
                >
                    A
                </option>

                <option value="B"
                    {% if question.correct_option == 'B' %}
                    selected
                    {% endif %}
                >
                    B
                </option>

                <option value="C"
                    {% if question.correct_option == 'C' %}
                    selected
                    {% endif %}
                >
                    C
                </option>

                <option value="D"
                    {% if question.correct_option == 'D' %}
                    selected
                    {% endif %}
                >
                    D
                </option>

            </select>

            <br><br>

            <label>Category</label>

            <input
                type="text"
                name="category"
                value="{{ question.category }}"
                required
                class="input"
            >

            <label>Difficulty</label>

            <select name="difficulty">

                <option value="Easy"
                    {% if question.difficulty == 'Easy' %}
                    selected
                    {% endif %}
                >
                    Easy
                </option>

                <option value="Medium"
                    {% if question.difficulty == 'Medium' %}
                    selected
                    {% endif %}
                >
                    Medium
                </option>

                <option value="Hard"
                    {% if question.difficulty == 'Hard' %}
                    selected
                    {% endif %}
                >
                    Hard
                </option>

            </select>

            <br><br>

            <button type="submit" class="btn btn-primary">
                Save Changes
            </button>

        </div>

    </form>

</div>
{% endblock %}
