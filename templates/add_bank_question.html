{% extends "base.html" %}

{% block title %}Add Question{% endblock %}

{% block content %}
<div class="container">

    <h1 class="page-title"> Add Question to Bank</h1>

    <form method="POST">

        <div class="card">

            <label>Question</label>
            <textarea name="question_text" required
                style="width:100%;min-height:100px"></textarea>

            <br><br>

            <label>Option A</label>
            <input type="text" name="option_a" required class="input">

            <label>Option B</label>
            <input type="text" name="option_b" required class="input">

            <label>Option C</label>
            <input type="text" name="option_c" required class="input">

            <label>Option D</label>
            <input type="text" name="option_d" required class="input">

            <br>

            <label>Correct Option</label>
            <select name="correct_option">
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>
            </select>

            <br><br>

            <label>Category</label>
            <input type="text" name="category" required class="input">

            <label>Difficulty</label>
            <select name="difficulty">
                <option>Easy</option>
                <option>Medium</option>
                <option>Hard</option>
            </select>

            <br><br>

            <button type="submit" class="btn btn-primary">
                Save Question
            </button>

        </div>

    </form>

</div>
{% endblock %}
